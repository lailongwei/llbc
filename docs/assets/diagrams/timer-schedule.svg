<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 310" width="800" height="310" role="img" aria-labelledby="t d">
  <title id="t">定时器调度与帧驱动</title>
  <desc id="d">LLBC_Timer 经 Schedule 注册到 TimerScheduler；Service 每帧 Update 推进调度器，到期触发超时回调，Cancel/析构触发取消回调。</desc>
  <defs>
    <style>
      .lbl{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;}
      .n{font-weight:700;font-size:14px;} .s{font-size:10.5px;} .e{font-size:11px;fill:#475569;font-weight:600;} .cap{font-size:11.5px;fill:#64748b;}
    </style>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#475569"/></marker>
  </defs>

  <!-- Timer -->
  <rect x="30" y="50" width="180" height="66" rx="11" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text class="lbl n" x="120" y="80" text-anchor="middle" fill="#1e40af">LLBC_Timer</text>
  <text class="lbl s" x="120" y="100" text-anchor="middle" fill="#1e40af">单次 / 周期</text>

  <!-- Scheduler -->
  <rect x="290" y="50" width="210" height="66" rx="11" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text class="lbl n" x="395" y="80" text-anchor="middle" fill="#1e40af">LLBC_TimerScheduler</text>
  <text class="lbl s" x="395" y="100" text-anchor="middle" fill="#1e40af">按到期时间的最小堆</text>

  <!-- 超时回调 -->
  <rect x="580" y="50" width="190" height="66" rx="11" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.8"/>
  <text class="lbl n" x="675" y="80" text-anchor="middle" fill="#1e40af" font-size="13">超时回调</text>
  <text class="lbl s" x="675" y="100" text-anchor="middle" fill="#1e40af">OnTimeout(timer) · Delegate</text>

  <!-- Service -->
  <rect x="290" y="200" width="210" height="66" rx="11" fill="#d1fae5" stroke="#059669" stroke-width="2"/>
  <text class="lbl n" x="395" y="230" text-anchor="middle" fill="#065f46">LLBC_Service 帧驱动</text>
  <text class="lbl s" x="395" y="250" text-anchor="middle" fill="#065f46">每帧 Update() · FPS 默认 60</text>

  <!-- 取消回调 -->
  <rect x="580" y="200" width="190" height="66" rx="11" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.8"/>
  <text class="lbl n" x="675" y="230" text-anchor="middle" fill="#1e40af" font-size="13">取消回调</text>
  <text class="lbl s" x="675" y="250" text-anchor="middle" fill="#1e40af">OnCancel(timer) · Delegate</text>

  <!-- arrows -->
  <line x1="210" y1="83" x2="288" y2="83" stroke="#475569" stroke-width="2" marker-end="url(#ar)"/>
  <text class="lbl e" x="249" y="74" text-anchor="middle">Schedule()</text>
  <line x1="500" y1="83" x2="578" y2="83" stroke="#475569" stroke-width="2" marker-end="url(#ar)"/>
  <text class="lbl e" x="539" y="74" text-anchor="middle">到期</text>
  <line x1="395" y1="200" x2="395" y2="118" stroke="#475569" stroke-width="2" marker-end="url(#ar)"/>
  <text class="lbl e" x="405" y="162" text-anchor="start">Update()</text>
  <line x1="500" y1="100" x2="578" y2="216" stroke="#475569" stroke-width="2" stroke-dasharray="5 3" marker-end="url(#ar)"/>
  <text class="lbl e" x="512" y="170" text-anchor="start">Cancel()/析构</text>

  <text class="lbl cap" x="400" y="292" text-anchor="middle">逻辑线程内构造的定时器自动关联当前线程调度器；Timer 与 Scheduler 均非线程安全，须同线程操作。</text>
</svg>
