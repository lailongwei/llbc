<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 240" width="760" height="240" role="img" aria-labelledby="t d">
  <title id="t">LLBC_Stream 读写游标分离</title>
  <desc id="d">Stream 内部维护独立的写游标(wpos)与读游标(rpos)：operator&lt;&lt; 推进 wpos，operator&gt;&gt; 推进 rpos；可读区间为 [rpos, wpos)。</desc>
  <defs>
    <style>
      .lbl{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;}
      .cur{font-weight:700;font-size:13px;} .op{font-size:12px;font-weight:600;} .reg{font-size:11px;fill:#475569;} .cap{font-size:11.5px;fill:#64748b;}
    </style>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#475569"/></marker>
  </defs>

  <!-- op notes -->
  <text class="lbl op" x="60" y="34" fill="#2563eb">operator&lt;&lt; 写入 → 推进 wpos</text>
  <text class="lbl op" x="700" y="34" text-anchor="end" fill="#059669">operator&gt;&gt; 读出 → 推进 rpos</text>

  <!-- buffer cells: 15 cells, 0..8 written(blue), 9..14 free(dashed) -->
  <g>
    <rect x="60"  y="96" width="40" height="48" fill="#dbeafe" stroke="#2563eb"/>
    <rect x="100" y="96" width="40" height="48" fill="#dbeafe" stroke="#2563eb"/>
    <rect x="140" y="96" width="40" height="48" fill="#dbeafe" stroke="#2563eb"/>
    <rect x="180" y="96" width="40" height="48" fill="#dbeafe" stroke="#2563eb"/>
    <rect x="220" y="96" width="40" height="48" fill="#dbeafe" stroke="#2563eb"/>
    <rect x="260" y="96" width="40" height="48" fill="#dbeafe" stroke="#2563eb"/>
    <rect x="300" y="96" width="40" height="48" fill="#dbeafe" stroke="#2563eb"/>
    <rect x="340" y="96" width="40" height="48" fill="#dbeafe" stroke="#2563eb"/>
    <rect x="380" y="96" width="40" height="48" fill="#dbeafe" stroke="#2563eb"/>
    <rect x="420" y="96" width="40" height="48" fill="#f8fafc" stroke="#cbd5e1" stroke-dasharray="4 3"/>
    <rect x="460" y="96" width="40" height="48" fill="#f8fafc" stroke="#cbd5e1" stroke-dasharray="4 3"/>
    <rect x="500" y="96" width="40" height="48" fill="#f8fafc" stroke="#cbd5e1" stroke-dasharray="4 3"/>
    <rect x="540" y="96" width="40" height="48" fill="#f8fafc" stroke="#cbd5e1" stroke-dasharray="4 3"/>
    <rect x="580" y="96" width="40" height="48" fill="#f8fafc" stroke="#cbd5e1" stroke-dasharray="4 3"/>
    <rect x="620" y="96" width="40" height="48" fill="#f8fafc" stroke="#cbd5e1" stroke-dasharray="4 3"/>
  </g>

  <!-- rpos cursor at x=180 (boundary before cell 3) -->
  <line x1="180" y1="72" x2="180" y2="94" stroke="#059669" stroke-width="2.5" marker-end="url(#ar)"/>
  <text class="lbl cur" x="180" y="66" text-anchor="middle" fill="#065f46">rpos 读游标</text>

  <!-- wpos cursor at x=420 (boundary after cell 8 = written end) -->
  <line x1="420" y1="72" x2="420" y2="94" stroke="#2563eb" stroke-width="2.5" marker-end="url(#ar)"/>
  <text class="lbl cur" x="420" y="66" text-anchor="middle" fill="#1e40af">wpos 写游标</text>

  <!-- readable region bracket [rpos, wpos) -->
  <line x1="180" y1="158" x2="420" y2="158" stroke="#475569" stroke-width="1.5"/>
  <line x1="180" y1="154" x2="180" y2="162" stroke="#475569" stroke-width="1.5"/>
  <line x1="420" y1="154" x2="420" y2="162" stroke="#475569" stroke-width="1.5"/>
  <text class="lbl reg" x="300" y="176" text-anchor="middle">可读区间 [rpos, wpos)</text>

  <!-- capacity region -->
  <line x1="420" y1="158" x2="660" y2="158" stroke="#cbd5e1" stroke-width="1.5"/>
  <text class="lbl reg" x="540" y="176" text-anchor="middle" fill="#94a3b8">剩余容量（尚未写入）</text>

  <text class="lbl cap" x="380" y="212" text-anchor="middle">读写游标相互独立；SetReadPos / SetWritePos 可分别定位，Attach 附着不拷贝底层数据。</text>
</svg>
