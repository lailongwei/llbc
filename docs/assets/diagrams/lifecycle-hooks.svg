<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 610" width="760" height="610" role="img" aria-labelledby="t d">
  <title id="t">LLBC_Component 生命周期钩子调用顺序</title>
  <desc id="d">构造后依次经初始化、启动、每帧运行循环、停止、销毁；OnEvent 与 OnReload 在运行期按需穿插。</desc>
  <defs>
    <style>
      .lbl { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", "Hiragino Sans GB", sans-serif; }
      .hook{ font-weight: 700; font-size: 13px; }
      .phase { font-weight: 700; font-size: 12px; }
      .pill { font-weight: 700; font-size: 13px; fill: #0f172a; }
      .note { font-size: 11px; fill: #475569; }
      .cap  { font-size: 11.5px; fill: #64748b; }
    </style>
    <marker id="a2" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#475569"/></marker>
    <marker id="av" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#7c3aed"/></marker>
  </defs>

  <!-- vertical connectors -->
  <line x1="310" y1="58"  x2="310" y2="72"  stroke="#475569" stroke-width="2" marker-end="url(#a2)"/>
  <line x1="310" y1="146" x2="310" y2="160" stroke="#475569" stroke-width="2" marker-end="url(#a2)"/>
  <line x1="310" y1="234" x2="310" y2="248" stroke="#475569" stroke-width="2" marker-end="url(#a2)"/>
  <line x1="310" y1="342" x2="310" y2="356" stroke="#475569" stroke-width="2" marker-end="url(#a2)"/>
  <line x1="310" y1="430" x2="310" y2="444" stroke="#475569" stroke-width="2" marker-end="url(#a2)"/>
  <line x1="310" y1="518" x2="310" y2="532" stroke="#475569" stroke-width="2" marker-end="url(#a2)"/>

  <!-- 构造 -->
  <rect x="235" y="26" width="150" height="32" rx="16" fill="#e2e8f0" stroke="#94a3b8"/>
  <text class="lbl pill" x="310" y="47" text-anchor="middle">构造 (ctor)</text>

  <!-- 初始化 -->
  <rect x="90" y="72" width="440" height="74" rx="12" fill="#eff6ff" stroke="#bfdbfe"/>
  <text class="lbl phase" x="104" y="90" fill="#1e40af">① 初始化</text>
  <rect x="150" y="96" width="150" height="40" rx="9" fill="#fff" stroke="#2563eb" stroke-width="1.8"/>
  <text class="lbl hook" x="225" y="121" text-anchor="middle" fill="#1e40af">OnInit</text>
  <rect x="330" y="96" width="150" height="40" rx="9" fill="#fff" stroke="#2563eb" stroke-width="1.8"/>
  <text class="lbl hook" x="405" y="121" text-anchor="middle" fill="#1e40af">OnLateInit</text>
  <line x1="300" y1="116" x2="330" y2="116" stroke="#475569" stroke-width="2" marker-end="url(#a2)"/>

  <!-- 启动 -->
  <rect x="90" y="160" width="440" height="74" rx="12" fill="#eff6ff" stroke="#bfdbfe"/>
  <text class="lbl phase" x="104" y="178" fill="#1e40af">② 启动</text>
  <rect x="150" y="184" width="150" height="40" rx="9" fill="#fff" stroke="#2563eb" stroke-width="1.8"/>
  <text class="lbl hook" x="225" y="209" text-anchor="middle" fill="#1e40af">OnStart</text>
  <rect x="330" y="184" width="150" height="40" rx="9" fill="#fff" stroke="#2563eb" stroke-width="1.8"/>
  <text class="lbl hook" x="405" y="209" text-anchor="middle" fill="#1e40af">OnLateStart</text>
  <line x1="300" y1="204" x2="330" y2="204" stroke="#475569" stroke-width="2" marker-end="url(#a2)"/>

  <!-- 运行 -->
  <rect x="90" y="248" width="440" height="94" rx="12" fill="#ecfdf5" stroke="#a7f3d0"/>
  <text class="lbl phase" x="104" y="266" fill="#065f46">③ 运行（每帧循环）</text>
  <rect x="104" y="284" width="126" height="40" rx="9" fill="#fff" stroke="#059669" stroke-width="1.8"/>
  <text class="lbl hook" x="167" y="309" text-anchor="middle" fill="#065f46">OnUpdate</text>
  <rect x="242" y="284" width="126" height="40" rx="9" fill="#fff" stroke="#059669" stroke-width="1.8"/>
  <text class="lbl hook" x="305" y="305" text-anchor="middle" fill="#065f46" font-size="12">OnLateUpdate</text>
  <rect x="380" y="284" width="126" height="40" rx="9" fill="#fff" stroke="#059669" stroke-width="1.8"/>
  <text class="lbl hook" x="443" y="309" text-anchor="middle" fill="#065f46">OnIdle</text>
  <line x1="230" y1="304" x2="242" y2="304" stroke="#475569" stroke-width="2" marker-end="url(#a2)"/>
  <line x1="368" y1="304" x2="380" y2="304" stroke="#475569" stroke-width="2" marker-end="url(#a2)"/>
  <!-- loop back arrow -->
  <path d="M104,318 C60,318 60,290 104,290" fill="none" stroke="#059669" stroke-width="1.8" stroke-dasharray="4 3" marker-end="url(#a2)"/>
  <text class="lbl note" x="52" y="307" text-anchor="middle" fill="#059669" transform="rotate(-90 52 307)">下一帧</text>

  <!-- cross-cutting -->
  <rect x="560" y="256" width="176" height="34" rx="9" fill="#f5f3ff" stroke="#7c3aed" stroke-width="1.6" stroke-dasharray="5 3"/>
  <text class="lbl hook" x="648" y="278" text-anchor="middle" fill="#5b21b6" font-size="12">OnEvent(...)　按需穿插</text>
  <rect x="560" y="300" width="176" height="34" rx="9" fill="#f5f3ff" stroke="#7c3aed" stroke-width="1.6" stroke-dasharray="5 3"/>
  <text class="lbl hook" x="648" y="322" text-anchor="middle" fill="#5b21b6" font-size="12">OnReload()　reload 时</text>
  <line x1="558" y1="295" x2="510" y2="295" stroke="#7c3aed" stroke-width="1.6" stroke-dasharray="5 3" marker-end="url(#av)"/>

  <!-- 停止 -->
  <rect x="90" y="356" width="440" height="74" rx="12" fill="#f8fafc" stroke="#e2e8f0"/>
  <text class="lbl phase" x="104" y="374" fill="#475569">④ 停止</text>
  <rect x="150" y="380" width="150" height="40" rx="9" fill="#fff" stroke="#64748b" stroke-width="1.8"/>
  <text class="lbl hook" x="225" y="405" text-anchor="middle" fill="#334155">OnEarlyStop</text>
  <rect x="330" y="380" width="150" height="40" rx="9" fill="#fff" stroke="#64748b" stroke-width="1.8"/>
  <text class="lbl hook" x="405" y="405" text-anchor="middle" fill="#334155">OnStop</text>
  <line x1="300" y1="400" x2="330" y2="400" stroke="#475569" stroke-width="2" marker-end="url(#a2)"/>

  <!-- 销毁 -->
  <rect x="90" y="444" width="440" height="74" rx="12" fill="#f8fafc" stroke="#e2e8f0"/>
  <text class="lbl phase" x="104" y="462" fill="#475569">⑤ 销毁</text>
  <rect x="150" y="468" width="150" height="40" rx="9" fill="#fff" stroke="#64748b" stroke-width="1.8"/>
  <text class="lbl hook" x="225" y="493" text-anchor="middle" fill="#334155">OnEarlyDestroy</text>
  <rect x="330" y="468" width="150" height="40" rx="9" fill="#fff" stroke="#64748b" stroke-width="1.8"/>
  <text class="lbl hook" x="405" y="493" text-anchor="middle" fill="#334155">OnDestroy</text>
  <line x1="300" y1="488" x2="330" y2="488" stroke="#475569" stroke-width="2" marker-end="url(#a2)"/>

  <!-- 析构 -->
  <rect x="235" y="532" width="150" height="32" rx="16" fill="#e2e8f0" stroke="#94a3b8"/>
  <text class="lbl pill" x="310" y="553" text-anchor="middle">析构 (dtor)</text>

  <!-- caption -->
  <text class="lbl cap" x="310" y="586" text-anchor="middle">蓝=返回 int（失败中断启动） · 绿=每帧调用 · 灰=void；Early/Late 作用在 Service 内所有 Component 的批次维度</text>
</svg>
