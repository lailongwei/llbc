############################################################################
# log output control 测试相关 logger 配置
# 配置项 logControls 为 JSON 数组字符串, schema:
#   { "match": { "file": "Foo.cpp" | {"name":"Foo.cpp","line":0},
#                "func": "DoBar" | ["DoBar","DoBaz"],
#                "threadId": 12345 | [12345,23456],
#                "level": "warn"|3 | ["warn","error"]|[3,4] },
#     "appenders": ["console","file","network"],   // 缺省 == 全部 appender
#     "action": "mute"|"setlevel", "newLevel": "error"|4 }
# match 内部各启用维度之间为 AND (all-of); 每条规则自身的取值集合
# (matchLineRanges/matchFuncs/matchThreadIds/matchLevels) 之内为 OR (one-of).
# 多控制项按声明顺序应用; setLevel 改写对后续控制项的 level 匹配可见.
# 解析失败的元素静默跳过, 不影响其它合法元素.
############################################################################

# 1) 全规则齐全 (含: 文件名+行号 / 文件名+行号范围 / 函数名 / 文件 setLevel / 单 appender 限定 / 多取值数组 OR)
# 那些"应 pass"的样本会被 console 真打出来, 这是预期行为(同时充当反向断言).
logcontrol_full.asynchronous=false
logcontrol_full.logToConsole=true
logcontrol_full.logToFile=false
logcontrol_full.consoleLogLevel=TRACE
logcontrol_full.fileLogLevel=TRACE
# - 控制项[0]: file=mute_fileA.cpp 且 line==100 静音 (字符串语法 "name:NN")
# - 控制项[1]: file=mute_fileA.cpp 且 line==200 静音 (对象语法)
# - 控制项[2]: file=mute_fileB.cpp 全文件静音 (line==0 通配)
# - 控制项[3]: 函数 MutedFuncOne 静音
# - 控制项[4]: 函数 MutedFuncTwo 静音 (限定仅 console appender 生效, file/network 不受影响)
# - 控制项[5]: file=mute_fileC.cpp 提级到 warn (低于 warn 的 trace/debug/info 一律改写到 warn)
# - 控制项[6]: file=mute_fileD.cpp 提级到 error
# - 控制项[7]: file=mute_fileE.cpp 行号范围 [300,305) 静音 (字符串语法 "name:NN-MM", 半开区间, 同 llbc 其它范围 API)
# - 控制项[8]: file=mute_fileF.cpp 行号范围 [400,410) 静音 (对象语法 line/lineEnd)
# - 控制项[9]: file=mute_fileG.cpp 多段 "50, 60-65, 70" 静音 (字符串语法; 命中 50 / 60..64 / 70)
# - 控制项[10]: file=mute_fileH.cpp 多段 "100-103, 200" 静音 (对象语法 lines 字段)
# - 控制项[11]: 函数 ["MutedFuncMA","MutedFuncMB"] 多值静音 (任一命中即静音)
# - 控制项[12]: threadId 数组多值静音 (内含一个真实 tid 与一个不存在的 tid; 仅真实 tid 命中)
#
# 下面是 logcontrol_full.logControls 的"等价多行格式化预览" (仅供阅读, 非生效配置).
# .cfg 解析器按行切分, 每行独立解析 key=value, 不支持值跨行, 因此真正生效的配置必须
# 写在同一行 (见本注释块下方). 编辑时建议先修改本预览, 再把它压回单行更新生效行.
# [
#   { "match": { "file": "mute_fileA.cpp:100" },                                    "action": "mute" },
#   { "match": { "file": { "name": "mute_fileA.cpp", "line": 200 } },               "action": "mute" },
#   { "match": { "file": "mute_fileB.cpp" },                                        "action": "mute" },
#   { "match": { "func": "MutedFuncOne" },                                          "action": "mute" },
#   { "match": { "func": "MutedFuncTwo" }, "appenders": ["console"],                "action": "mute" },
#   { "match": { "file": "mute_fileC.cpp" },                                        "action": "setlevel", "newLevel": "warn"  },
#   { "match": { "file": "mute_fileD.cpp" },                                        "action": "setlevel", "newLevel": "error" },
#   { "match": { "file": "mute_fileE.cpp:300-305" },                                "action": "mute" },
#   { "match": { "file": { "name": "mute_fileF.cpp", "line": 400, "lineEnd": 410 } }, "action": "mute" },
#   { "match": { "file": "mute_fileG.cpp:50, 60-65, 70" },                          "action": "mute" },
#   { "match": { "file": { "name": "mute_fileH.cpp", "lines": "100-103, 200" } },   "action": "mute" },
#   { "match": { "func": ["MutedFuncMA", "MutedFuncMB"] },                          "action": "mute" },
#   { "match": { "threadId": [1, 2147483640] },                                     "action": "mute" }
# ]
logcontrol_full.logControls=[{"match":{"file":"mute_fileA.cpp:100"},"action":"mute"},{"match":{"file":{"name":"mute_fileA.cpp","line":200}},"action":"mute"},{"match":{"file":"mute_fileB.cpp"},"action":"mute"},{"match":{"func":"MutedFuncOne"},"action":"mute"},{"match":{"func":"MutedFuncTwo"},"appenders":["console"],"action":"mute"},{"match":{"file":"mute_fileC.cpp"},"action":"setlevel","newLevel":"warn"},{"match":{"file":"mute_fileD.cpp"},"action":"setlevel","newLevel":"error"},{"match":{"file":"mute_fileE.cpp:300-305"},"action":"mute"},{"match":{"file":{"name":"mute_fileF.cpp","line":400,"lineEnd":410}},"action":"mute"},{"match":{"file":"mute_fileG.cpp:50, 60-65, 70"},"action":"mute"},{"match":{"file":{"name":"mute_fileH.cpp","lines":"100-103, 200"}},"action":"mute"},{"match":{"func":["MutedFuncMA","MutedFuncMB"]},"action":"mute"},{"match":{"threadId":[1,2147483640]},"action":"mute"}]

# 2) 容错样本: 数组中混入坏元素, 期望坏的被静默跳过, 好的依然生效.
#    - 第 0 项: 没有任何 match 字段, 应被跳过 (HasAnyMatch() 失败).
#    - 第 1 项: file 既不是字符串也不是对象, 应被跳过.
#    - 第 2 项: action 非法字符串, 应被跳过.
#    - 第 3 项: action="setlevel" 但缺 newLevel, 应被跳过.
#    - 第 4 项: appenders 中含未知 appender 字符串, 期望"未知项被忽略", 控制项整体仍生效.
#    - 第 5 项: 合法控制项, 函数 ok_func 静音.
#    - 第 6 项: file 字符串带非法范围 (end <= begin), 应被跳过.
logcontrol_robust.asynchronous=false
logcontrol_robust.logToConsole=true
logcontrol_robust.logToFile=false
logcontrol_robust.consoleLogLevel=TRACE
logcontrol_robust.fileLogLevel=TRACE
# 下面是 logcontrol_robust.logControls 的"等价多行格式化预览" (仅供阅读, 非生效配置).
# 真正生效的配置在本注释块下方的单行 logcontrol_robust.logControls=... 上.
# [
#   { "match": {},                       "action": "mute"          },                              # [0] 无 match 字段, 跳过
#   { "match": { "file": 12345 },        "action": "mute"          },                              # [1] file 类型非法, 跳过
#   { "match": { "func": "X" },          "action": "unknownaction" },                              # [2] action 非法, 跳过
#   { "match": { "func": "Y" },          "action": "setlevel"      },                              # [3] setlevel 缺 newLevel, 跳过
#   { "match": { "func": "keep_me" },    "appenders": ["console", "totally_unknown_appender"], "action": "mute" }, # [4] 未知 appender 被忽略, 整体生效
#   { "match": { "func": "ok_func" },    "action": "mute"          },                              # [5] 合法
#   { "match": { "file": "bad.cpp:10-10" }, "action": "mute"       }                               # [6] 非法范围 (end<=begin), 跳过
# ]
logcontrol_robust.logControls=[{"match":{},"action":"mute"},{"match":{"file":12345},"action":"mute"},{"match":{"func":"X"},"action":"unknownaction"},{"match":{"func":"Y"},"action":"setlevel"},{"match":{"func":"keep_me"},"appenders":["console","totally_unknown_appender"],"action":"mute"},{"match":{"func":"ok_func"},"action":"mute"},{"match":{"file":"bad.cpp:10-10"},"action":"mute"}]

############################################################################
# fadvise logger属性配置
############################################################################
fadvise.asynchronous=false
fadvise.flushInterval=50
fadvise.logToConsole=false
fadvise.logToFile=true
fadvise.fileLogLevel=INFO
fadvise.fileBufferSize=1024
fadvise.logFile=log/llbc_logger_%L
fadvise.forceAppLogPath=false
fadvise.filePattern=%T [%-5L{Short}][%f:%l]{tag:%g} - %m%n
fadvise.fileRollingMode=Hourly
fadvise.maxFileSize=100MiB
fadvise.maxBackupIndex=10
fadvise.enableFadviseDiscard=true
fadvise.fadviseDiscardSize=40MiB
fadvise.fadviseDiscardRetainPercent=50

# 其它 logger(s) 配置
